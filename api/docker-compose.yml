name: solid_api_sample

services:
    solid_api_mysql:
        image: mysql:8
        ports:
            - 3306:3306
        environment:
            MYSQL_ROOT_PASSWORD: docker123
            MYSQL_DATABASE: gympass-db
        # Lets `docker compose up -d --wait` block until MySQL actually accepts
        # connections (the container "started" well before that). Used by db:fresh.
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" --silent',
                ]
            interval: 3s
            timeout: 3s
            retries: 20
            start_period: 5s
