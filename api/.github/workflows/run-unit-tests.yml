name: Unit Tests

on: [push]

jobs:
    run-unit-tests:
        name: Execute Unit Tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
            - uses: pnpm/action-setup@v4
            - run: pnpm install --frozen-lockfile
            # Type-check and lint gates: vitest transpiles without type-checking,
            # so tsc/ESLint breakage is invisible to the test step otherwise.
            - run: pnpm compile
            - run: pnpm lint
            # Unit tests don't touch the DB, but importing env (e.g. via the
            # send-verification use-case) validates these on load.
            - run: pnpm test
              env:
                  NODE_ENV: test
                  JWT_SECRET: unit-tests-jwt-secret-min-20-chars
                  ADMIN_USERNAME: admin
                  ADMIN_EMAIL: admin@example.com
                  ADMIN_PASSWORD: Admin@12345
                  # Some unit specs import @/app, whose prisma adapter parses
                  # DATABASE_URL at module load. Unit tests never connect, so a
                  # syntactically-valid dummy is enough.
                  DATABASE_URL: 'mysql://root:test@127.0.0.1:3306/test'
