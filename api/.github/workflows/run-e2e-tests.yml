name: E2E Tests

on: [pull_request]

jobs:
    run-e2e-tests:
        name: Execute E2E Tests
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8
                ports:
                    - 3306:3306
                env:
                    MYSQL_ROOT_PASSWORD: docker123
                    MYSQL_DATABASE: gympass-db
                options: >-
                    --health-cmd="mysqladmin ping -h localhost"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
            - uses: pnpm/action-setup@v4
            - run: pnpm install --frozen-lockfile
            # Type-check and lint gates (cheap; catch drift on PRs early).
            - run: pnpm compile
            - run: pnpm lint
            # Runs every project (unit + e2e) under coverage and enforces the
            # thresholds in vite.config.mts. MySQL exists in this job.
            - run: pnpm test:coverage

              env:
                  NODE_ENV: test
                  PORT: 3333
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  DATABASE_URL: 'mysql://root:docker123@127.0.0.1:3306/gympass-db'
                  ADMIN_USERNAME: admin
                  ADMIN_EMAIL: admin@example.com
                  ADMIN_PASSWORD: Admin@12345
